spring.application.name=Miaumigo

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.orm.jdbc.bind=INFO

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:2024}
spring.datasource.driver-class-name=org.postgresql.Driver

gemini.api.url=https://generativelanguage.googleapis.com
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
spring.cloud.openfeign.client.config.geminiClient.connectTimeout=5000
spring.cloud.openfeign.client.config.geminiClient.readTimeout=20000
